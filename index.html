<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gestao DF-SUL</title><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Amazon Ember','Segoe UI',system-ui,sans-serif;background:#F5F7FA;color:#0F1111;font-size:14px}
.hdr{background:#131921;padding:0 24px;display:flex;align-items:center;gap:16px;height:54px;border-bottom:3px solid #FF9900}
.logo{display:flex;flex-direction:column}
.logo b{font-size:20px;font-weight:700;color:#fff;font-style:italic}
.sep{width:1px;height:30px;background:#3a4553}
.hdr h1{font-size:15px;font-weight:700;color:#fff}
.hdr p{font-size:11px;color:#8fa3b1}
.tabs{background:#1a2533;display:flex;padding:0 24px;gap:2px;border-bottom:1px solid #2d3a4a}
.tab{padding:12px 20px;color:#8fa3b1;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:color .2s,border-color .2s}
.tab:hover{color:#fff}
.tab.on{color:#fff;border-bottom-color:#FF9900}
.bdg{background:#FF9900;color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;margin-left:4px}
.pnl{display:none;padding:24px;max-width:1400px;margin:0 auto}
.pnl.on{display:block}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.bL{flex:1;display:flex;gap:10px;flex-wrap:wrap}
.bar select,.bar input{background:#fff;border:1px solid #D5D9D9;border-radius:6px;padding:7px 11px;font-size:12px;color:#0F1111;outline:none}
.bar select:focus,.bar input:focus{border-color:#FF9900}
.btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.bp{background:#FF9900;color:#000}.bp:hover{background:#e68900}
.bg{background:#fff;border:1px solid #D5D9D9;color:#565959}.bg:hover{border-color:#FF9900}
.sm{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:none}
.se{background:#dbeafe;color:#1e40af}.sd{background:#fee2e2;color:#991b1b}
.tw{background:#fff;border:1px solid #D5D9D9;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:10px 12px;font-size:10px;font-weight:700;color:#565959;text-transform:uppercase;letter-spacing:.6px;text-align:left;background:#f8f9fa;border-bottom:2px solid #D5D9D9;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #eff0f1;vertical-align:top;word-break:break-word;line-height:1.5}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.np{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:800;color:#fff}
.sp{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700}
.so{background:#FEF3C7;color:#92400E}.sp2{background:#DBEAFE;color:#1e40af}
.sd2{background:#DCFCE7;color:#166534}.se2{background:#FEE2E2;color:#991B1B}
.pk{color:#166634;font-weight:700}.pa{color:#b45309;font-weight:700}.pl{color:#991B1B;font-weight:700}
.empty{text-align:center;padding:48px 24px;color:#565959}
.lgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.lc{background:#fff;border:1px solid #D5D9D9;border-radius:10px;padding:16px;text-decoration:none;display:flex;flex-direction:column;gap:6px;transition:all .2s}
.lc:hover{border-color:#FF9900;box-shadow:0 2px 10px rgba(255,153,0,.15);transform:translateY(-1px)}
.ls{margin-bottom:24px}
.ls h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#565959;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #D5D9D9}
.la{background:none;border:2px dashed #D5D9D9;border-radius:10px;padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:90px;width:100%;transition:all .2s}
.la:hover{border-color:#FF9900;background:#fffbf0}
.al{display:grid;grid-template-columns:1fr 310px;gap:20px}
@media(max-width:900px){.al{grid-template-columns:1fr}}
.cw{background:#fff;border:1px solid #D5D9D9;border-radius:10px;overflow:hidden}
.ch{background:#f8f9fa;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #D5D9D9}
.ch h2{font-size:15px;font-weight:700}
.cn{display:flex;gap:6px;align-items:center}
.bn{background:#fff;border:1px solid #D5D9D9;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:14px;font-weight:700}
.bn:hover{border-color:#FF9900}
.cg{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px}
.dw{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:#565959;padding:6px 0;border-bottom:1px solid #D5D9D9;margin-bottom:4px}
.cd{min-height:72px;border-radius:7px;padding:4px 5px;cursor:pointer}
.cd:hover{background:#f5f7fa}
.cd.td .dn{background:#FF9900;color:#000;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800}
.cd.om .dn{color:#c8cdd2}
.dn{font-size:12px;font-weight:600;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.ev{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.em{font-size:9px;color:#565959;padding:0 4px}
.ef{background:#fce7f3;color:#9d174d}.ed{background:#dbeafe;color:#1e40af}
.ew{background:#dcfce7;color:#166534}.er{background:#ede9fe;color:#5b21b6}.eo{background:#f1f5f9;color:#475569}
.as{display:flex;flex-direction:column;gap:14px}
.sc{background:#fff;border:1px solid #D5D9D9;border-radius:10px;overflow:hidden}
.sh{padding:12px 16px;background:#f8f9fa;border-bottom:1px solid #D5D9D9;font-size:11px;font-weight:700;color:#565959;text-transform:uppercase;letter-spacing:.5px}
.sb{padding:12px 16px}
.ei{padding:8px 10px;border-radius:7px;margin-bottom:6px;font-size:12px;cursor:pointer}
.lr{display:flex;align-items:center;gap:8px;font-size:11px;color:#565959;margin-bottom:6px}
.ld{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.ne{text-align:center;padding:16px;color:#565959;font-size:12px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}
.ovl.on{display:flex}
.mdl{background:#1a1d20;border-radius:14px;width:min(580px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.6);border:1px solid #2d3035;color:#e8eaed}
.mh{padding:18px 24px 14px;border-bottom:1px solid #2d3035;display:flex;align-items:center;justify-content:space-between}
.mh h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#9aa0a6;margin:0}
.mx{background:none;border:none;color:#9aa0a6;font-size:20px;cursor:pointer;line-height:1}
.mx:hover{color:#FF9900}
.mb{padding:20px 24px;display:grid;gap:14px;grid-template-columns:1fr 1fr}
.mb .fl{grid-column:1/-1}
.fi{display:flex;flex-direction:column;gap:5px}
.fi label{font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;letter-spacing:.7px}
.fi input,.fi select,.fi textarea{background:#0f1214;border:1px solid #2d3035;border-radius:6px;padding:8px 11px;font-size:12px;color:#e8eaed;outline:none;font-family:inherit}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:#FF9900}
.fi textarea{min-height:80px;resize:vertical}
.mf{padding:14px 24px 18px;border-top:1px solid #2d3035;display:flex;justify-content:flex-end;gap:10px;background:#1a1d20;border-radius:0 0 14px 14px}
.bsv{background:#FF9900;color:#000;border:none;border-radius:8px;padding:9px 22px;font-size:12px;font-weight:800;cursor:pointer}
.bcl{background:none;border:1px solid #3d4449;color:#9aa0a6;border-radius:8px;padding:9px 16px;font-size:12px;cursor:pointer}
.bcl:hover{border-color:#9aa0a6;color:#e8eaed}
</style></head><body>
<div class="hdr">
  <div class="logo"><b>amazon</b>
    <svg viewBox="0 0 100 20" fill="none" style="width:40px;height:7px;margin-top:-1px">
      <path d="M5 5 Q50 22 95 5" stroke="#FF9900" stroke-width="5" stroke-linecap="round" fill="none"/>
      <polygon points="88,2 97,8 90,12" fill="#FF9900"/>
    </svg>
  </div>
  <div class="sep"></div>
  <div><h1>Painel de Gestão DF-SUL</h1><p>AMZL First Mile &middot; Tratativas &middot; Links &middot; Agenda</p></div>
</div>
<div class="tabs">
  <button class="tab on" data-tab="tratativas">📋 Tratativas <span class="bdg" id="btrat">0</span></button>
  <button class="tab" data-tab="links">🔗 Links Rápidos</button>
  <button class="tab" data-tab="agenda">📅 Agenda <span class="bdg" id="bag">0</span></button>
</div>
<div class="pnl on" id="pnl-tratativas">
  <div class="bar">
    <div class="bL">
      <select id="fn"><option value="">Todos os nodes</option><option>ECB8</option><option>EGO8</option><option>EIJ8</option><option>EJO8</option><option>ELO8</option><option>EME8</option><option>EMR8</option><option>ERS8</option><option>ESB8</option><option>ESE8</option><option>EUM8</option><option>EVE8</option><option>EXS9</option></select>
      <select id="frp"><option value="">Todos responsáveis</option><option>Kimberly</option><option>Adriano</option><option>Marina</option><option>Vinicius</option><option>João</option></select>
      <select id="fst"><option value="">Todos status</option><option value="open">Em Aberto</option><option value="prog">Em Andamento</option><option value="done">Resolvido</option><option value="esc">Escalado</option></select>
      <input type="text" id="fq" placeholder="Buscar...">
    </div>
    <button class="btn bg" id="bexp">⬇ Exportar</button>
    <button class="btn bp" id="bnt">+ Nova Tratativa</button>
  </div>
  <div class="tw"><table><colgroup><col style="width:80px"><col style="width:100px"><col style="width:200px"><col style="width:200px"><col style="width:90px"><col style="width:100px"><col style="width:100px"><col style="width:80px"></colgroup>
    <thead><tr><th>Node</th><th>Responsável</th><th>Tratativa</th><th>Andamento</th><th>Prazo</th><th>Status</th><th>Incluído</th><th>Ações</th></tr></thead>
    <tbody id="tb"></tbody>
  </table></div>
</div>
<div class="pnl" id="pnl-links">
  <div id="lw"></div>
  <div style="margin-top:12px;display:flex;gap:10px">
    <button class="btn bp" id="bnl">+ Adicionar Link</button>
    <button class="btn bg" id="bncat">+ Nova Categoria</button>
  </div>
</div>
<div class="pnl" id="pnl-agenda">
  <div class="al">
    <div><div class="cw">
      <div class="ch">
        <div class="cn"><button class="bn" id="cprev">&#8249;</button></div>
        <h2 id="ctit"></h2>
        <div class="cn"><button class="bn" id="cnxt">&#8250;</button>
          <button class="btn bp" style="padding:5px 14px;font-size:11px;margin-left:8px" id="bne">+ Evento</button></div>
      </div>
      <div class="cg" id="cg"></div>
    </div></div>
    <div class="as">
      <div class="sc"><div class="sh">Próximos Eventos</div><div class="sb" id="nev"></div></div>
      <div class="sc"><div class="sh">Férias / Ausências</div><div class="sb" id="fel"></div></div>
      <div class="sc"><div class="sh">Legenda</div><div class="sb">
        <div class="lr"><div class="ld ef"></div> Férias / Ausência</div>
        <div class="lr"><div class="ld ed"></div> Reunião DDD</div>
        <div class="lr"><div class="ld ew"></div> WBR com Parceiros</div>
        <div class="lr"><div class="ld er"></div> Outras Reuniões</div>
        <div class="lr"><div class="ld eo"></div> Outro</div>
      </div></div>
    </div>
  </div>
</div>
<div class="ovl" id="ovlt"><div class="mdl">
  <div class="mh"><h3 id="ttit">Nova Tratativa</h3><button class="mx" id="txcl">&#10005;</button></div>
  <div class="mb"><input type="hidden" id="tid">
    <div class="fi"><label>Node</label><select id="tno"><option value="">Selecione...</option><option>ECB8</option><option>EGO8</option><option>EIJ8</option><option>EJO8</option><option>ELO8</option><option>EME8</option><option>EMR8</option><option>ERS8</option><option>ESB8</option><option>ESE8</option><option>EUM8</option><option>EVE8</option><option>EXS9</option></select></div>
    <div class="fi"><label>Responsável</label><select id="trp"><option value="">Selecione...</option><option>Kimberly</option><option>Adriano</option><option>Marina</option><option>Vinicius</option><option>João</option></select></div>
    <div class="fi fl"><label>Tratativa</label><textarea id="tde" placeholder="Descreva..."></textarea></div>
    <div class="fi fl"><label>Andamento</label><textarea id="tan" placeholder="Status atual..." style="min-height:60px"></textarea></div>
    <div class="fi"><label>Prazo</label><input type="date" id="tpr"></div>
    <div class="fi"><label>Status</label><select id="tst"><option value="open">Em Aberto</option><option value="prog">Em Andamento</option><option value="done">Resolvido</option><option value="esc">Escalado</option></select></div>
  </div>
  <div class="mf"><button class="bcl" id="txcn">Cancelar</button><button class="bsv" id="tsv">Salvar</button></div>
</div></div>
<div class="ovl" id="ovll"><div class="mdl">
  <div class="mh"><h3 id="ltit">Novo Link</h3><button class="mx" id="lxcl">&#10005;</button></div>
  <div class="mb"><input type="hidden" id="lid">
    <div class="fi"><label>Nome</label><input type="text" id="lnm" placeholder="FM Metrics"></div>
    <div class="fi"><label>Categoria</label><select id="lct"><option value="">Selecione...</option></select></div>
    <div class="fi fl"><label>URL</label><input type="text" id="lur" placeholder="https://..."></div>
    <div class="fi"><label>Ícone</label><input type="text" id="lic" placeholder="📊" maxlength="4"></div>
    <div class="fi"><label>Descrição</label><input type="text" id="ldc" placeholder="Opcional"></div>
  </div>
  <div class="mf"><button class="bcl" id="lxcn">Cancelar</button><button class="bsv" id="lsv">Salvar</button></div>
</div></div>
<div class="ovl" id="ovle"><div class="mdl">
  <div class="mh"><h3 id="etit">Novo Evento</h3><button class="mx" id="excl">&#10005;</button></div>
  <div class="mb"><input type="hidden" id="eid">
    <div class="fi fl"><label>Título</label><input type="text" id="eti" placeholder="Ex: Férias Adriano, WBR ECB8..."></div>
    <div class="fi"><label>Tipo</label><select id="etp"><option value="ferias">Férias/Ausência</option><option value="ddd">Reunião DDD</option><option value="wbr">WBR com Parceiros</option><option value="reun">Outra Reunião</option><option value="outro">Outro</option></select></div>
    <div class="fi"><label>Pessoa</label><select id="epe"><option value="">Geral/Todos</option><option>Kimberly</option><option>Adriano</option><option>Marina</option><option>Vinicius</option><option>João</option></select></div>
    <div class="fi"><label>Data Início</label><input type="date" id="est"></div>
    <div class="fi"><label>Data Fim</label><input type="date" id="een"></div>
    <div class="fi fl"><label>Observação</label><input type="text" id="eob" placeholder="Opcional"></div>
    <div class="fi" id="edw" style="display:none"><label>&nbsp;</label><button class="bcl" id="edel" style="border-color:#991b1b;color:#991b1b">Excluir</button></div>
  </div>
  <div class="mf"><button class="bcl" id="excn">Cancelar</button><button class="bsv" id="esv">Salvar</button></div>
</div></div>
<script>
var NC={ECB8:'#1e40af',EIJ8:'#7c3aed',EJO8:'#0369a1',ELO8:'#065f46',EME8:'#9a3412',
  EMR8:'#1d4ed8',EGO8:'#14532d',ERS8:'#92400e',ESB8:'#1e3a5f',ESE8:'#7f1d1d',
  EUM8:'#3b0764',EVE8:'#134e4a',EXS9:'#78350f'};
var SL={open:'Em Aberto',prog:'Em Andamento',done:'Resolvido',esc:'Escalado'};
var SC={open:'so',prog:'sp2',done:'sd2',esc:'se2'};
var EC={ferias:'ef',ddd:'ed',wbr:'ew',reun:'er',outro:'eo'};
var MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DN=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var cY=new Date().getFullYear(), cM=new Date().getMonth();

function lsG(k,fb){try{var r=localStorage.getItem('gs_'+k);if(!r)return fb;var v=JSON.parse(r);return v!==null?v:fb;}catch(e){return fb;}}
function lsS(k,v){try{localStorage.setItem('gs_'+k,JSON.stringify(v));}catch(e){}}

var DFL={cats:['Operacional','Métricas','Sistemas'],links:[
  {id:'l1',name:'FM Metrics',url:'https://metrics.amazon.com',ico:'📊',desc:'Métricas First Mile',cat:'Métricas'},
  {id:'l2',name:'PRISM',url:'https://trans-logistics.amazon.com/ssp/prism/flow/home_success',ico:'🚛',desc:'Transporte',cat:'Sistemas'},
  {id:'l3',name:'Cortex ESE8',url:'https://logistics.amazon.com.br/internal/operations/execution/itineraries?serviceAreaId=7fca7319-0762-40b2-9f5b-ebc8615a4522',ico:'🗺',desc:'Itinerários ESE8',cat:'Sistemas'},
  {id:'l4',name:'Truck Planning',url:'https://adrianovie-rgb.github.io/Truck-Planning-DF-SUL/',ico:'🚚',desc:'Planejamento veículos',cat:'Operacional'},
  {id:'l5',name:'WBR DF-SUL',url:'https://adrianovie-rgb.github.io/WBR---DF-SUL/',ico:'📈',desc:'Dashboard WBR',cat:'Métricas'},
  {id:'l6',name:'Wash Report',url:'https://adrianovie-rgb.github.io/fm-edsps/index.html',ico:'📝',desc:'Relatório diário',cat:'Operacional'}
]};

function lT(){var d=lsG('tr',null);return Array.isArray(d)?d:[];}
function lL(){var d=lsG('lk',null);return(d&&Array.isArray(d.cats)&&Array.isArray(d.links))?d:JSON.parse(JSON.stringify(DFL));}
function lE(){var d=lsG('ev',null);return Array.isArray(d)?d:[];}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function td(){return new Date().toISOString().slice(0,10);}
function fd(s){if(!s)return'-';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── TABS ────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.pnl').forEach(function(p){p.classList.remove('on');});
  var btn = document.querySelector('.tab[data-tab="'+name+'"]');
  var pnl = document.getElementById('pnl-'+name);
  if(btn) btn.classList.add('on');
  if(pnl) pnl.classList.add('on');
  if(name==='tratativas') rT();
  if(name==='links') rL();
  if(name==='agenda') rC();
}

// ─── BADGES ──────────────────────────────────────────────────────
function badges(){
  var t=lT().filter(function(x){return x.s!=='done';}).length;
  var bt=document.getElementById('btrat'); bt.textContent=t; bt.style.display=t?'':'none';
  var today=td();
  var e=lE().filter(function(x){return(x.en||x.st)>=today;}).length;
  var ba=document.getElementById('bag'); ba.textContent=e; ba.style.display=e?'':'none';
}

// ─── TRATATIVAS ──────────────────────────────────────────────────
function rT(){
  var n=document.getElementById('fn').value;
  var r=document.getElementById('frp').value;
  var s=document.getElementById('fst').value;
  var q=document.getElementById('fq').value.toLowerCase();
  var data=lT().filter(function(t){
    if(n&&t.nd!==n)return false;
    if(r&&t.rp!==r)return false;
    if(s&&t.s!==s)return false;
    if(q&&!((t.dc||'').toLowerCase().includes(q)||(t.an||'').toLowerCase().includes(q)||(t.nd||'').toLowerCase().includes(q)))return false;
    return true;
  });
  var tb=document.getElementById('tb');
  if(!data.length){tb.innerHTML='<tr><td colspan="8"><div class="empty"><div style="font-size:36px;margin-bottom:8px">📋</div><p>Nenhuma tratativa.<br><b>+ Nova Tratativa</b> para começar.</p></div></td></tr>';return;}
  var today=td();
  tb.innerHTML=data.map(function(t){
    var pc='',ps=fd(t.pr);
    if(t.pr&&t.s!=='done'){var df=Math.ceil((new Date(t.pr)-new Date(today))/86400000);pc=df<0?'pl':df<=3?'pa':'pk';if(df<0)ps+=' ⚠';}
    return '<tr>'+
    '<td><span class="np" style="background:'+(NC[t.nd]||'#475569')+'">'+esc(t.nd||'-')+'</span></td>'+
    '<td style="font-weight:600">'+esc(t.rp||'-')+'</td>'+
    '<td>'+esc(t.dc||'-')+'</td>'+
    '<td>'+esc(t.an||'-')+'</td>'+
    '<td class="'+pc+'">'+ps+'</td>'+
    '<td><span class="sp '+(SC[t.s]||'so')+'">'+(SL[t.s]||'Em Aberto')+'</span></td>'+
    '<td style="font-size:11px;color:#565959">'+fd(t.ct)+'</td>'+
    '<td><button class="sm se" data-ed="'+esc(t.id)+'">✎</button> <button class="sm sd" data-dl="'+esc(t.id)+'">✕</button></td>'+
    '</tr>';
  }).join('');
  tb.onclick=null;
  tb.addEventListener('click',function h(e){
    var ed=e.target.getAttribute('data-ed');
    var dl=e.target.getAttribute('data-dl');
    if(ed){openT(ed);return;}
    if(dl&&confirm('Remover tratativa?')){delT(dl);}
  });
}

function closeT(){document.getElementById('ovlt').classList.remove('on');}
function saveT(){
  var id=document.getElementById('tid').value;

  var rp=document.getElementById('trp').value;
  var dc=document.getElementById('tde').value.trim();
  if(!nd||!rp||!dc){alert('Preencha Node, Responsável e Tratativa.');return;}
  var data=lT();
  var e={id:id||uid(),nd:nd,rp:rp,dc:dc,
    an:document.getElementById('tan').value.trim(),
    pr:document.getElementById('tpr').value,
    s:document.getElementById('tst').value,
    ct:id?((data.find(function(t){return t.id===id;})||{}).ct||td()):td()};
  lsS('tr',id?data.map(function(t){return t.id===id?e:t;}):([e].concat(data)));
  closeT(); rT(); badges();
}
function delT(id){lsS('tr',lT().filter(function(t){return t.id!==id;}));rT();badges();}
function exportT(){
  var data=lT();
  if(!data.length){alert('Sem dados.');return;}
  var rows=[['Node','Responsável','Tratativa','Andamento','Prazo','Status','Data']];
  data.forEach(function(t){rows.push([t.nd,t.rp,t.dc,t.an||'',fd(t.pr),SL[t.s]||'',fd(t.ct)]);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='tratativas_'+td()+'.csv';a.click();
}

// ─── LINKS ────────────────────────────────────────────────────────
function rL(){
  var data=lL(), w=document.getElementById('lw'), bc={};
  data.cats.forEach(function(c){bc[c]=[];});
  data.links.forEach(function(l){if(!bc[l.cat])bc[l.cat]=[];bc[l.cat].push(l);});
  w.innerHTML=data.cats.map(function(cat){
    var cards=(bc[cat]||[]).map(function(l){
      return '<a class="lc" href="'+esc(l.url)+'" target="_blank" rel="noopener">'+
        '<div style="font-size:24px">'+(l.ico||'🔗')+'</div>'+
        '<div style="font-size:13px;font-weight:700;color:#0F1111">'+esc(l.name)+'</div>'+
        (l.desc?'<div style="font-size:11px;color:#565959">'+esc(l.desc)+'</div>':'')+
        '<div style="font-size:10px;color:#00A8E1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(l.url)+'</div>'+
        '</a>';
    }).join('');
    return '<div class="ls"><h3>'+esc(cat)+'</h3><div class="lgr">'+cards+
      '<button class="la" data-ac="'+esc(cat)+'"><span style="font-size:22px">＋</span>'+
      '<span style="font-size:11px;color:#565959;font-weight:600">Adicionar link</span></button>'+
      '</div></div>';
  }).join('');
  var sel=document.getElementById('lct');
  sel.innerHTML='<option value="">Selecione...</option>'+data.cats.map(function(c){return'<option>'+esc(c)+'</option>';}).join('');
  w.onclick=null;
  w.addEventListener('click',function(e){
    var b=e.target.closest('[data-ac]');
    if(b) openL(null,b.getAttribute('data-ac'));
  });
}
function openL(id,dc){
  var data=lL(), l=id?data.links.find(function(x){return x.id===id;}):null;
  document.getElementById('ltit').textContent=l?'Editar Link':'Novo Link';
  document.getElementById('lid').value=l?l.id:'';
  document.getElementById('lnm').value=l?l.name:'';
  document.getElementById('lur').value=l?l.url:'';
  document.getElementById('lic').value=l?(l.ico||''):'';
  document.getElementById('ldc').value=l?(l.desc||''):'';
  rL();
  setTimeout(function(){var s=document.getElementById('lct');if(s)s.value=l?l.cat:(dc||'');},10);
  document.getElementById('ovll').classList.add('on');
}
function closeL(){document.getElementById('ovll').classList.remove('on');}
function saveL(){
  var id=document.getElementById('lid').value;
  var name=document.getElementById('lnm').value.trim();
  var url=document.getElementById('lur').value.trim();
  var cat=document.getElementById('lct').value;
  if(!name||!url||!cat){alert('Preencha Nome, URL e Categoria.');return;}
  var data=lL();
  var e={id:id||uid(),name:name,url:url,ico:document.getElementById('lic').value||'🔗',desc:document.getElementById('ldc').value.trim(),cat:cat};
  if(id)data.links=data.links.map(function(l){return l.id===id?e:l;});else data.links.push(e);
  lsS('lk',data); closeL(); rL();
}
function addCat(){
  var n=prompt('Nome da categoria:');
  if(!n||!n.trim())return;
  var data=lL();
  if(data.cats.indexOf(n.trim())===-1)data.cats.push(n.trim());
  lsS('lk',data); rL();
}

// ─── AGENDA ───────────────────────────────────────────────────────
function navC(d){cM+=d;if(cM>11){cM=0;cY++;}if(cM<0){cM=11;cY--;}rC();}
function evDay(iso){return lE().filter(function(e){return iso>=(e.st||'')&&iso<=(e.en||e.st||'');});}
function rC(){
  document.getElementById('ctit').textContent=MN[cM]+' '+cY;
  var today=td(),fd2=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate(),dip=new Date(cY,cM,0).getDate();
  var h=DN.map(function(d){return'<div class="dw">'+d+'</div>';}).join('');
  for(var i=fd2-1;i>=0;i--)h+='<div class="cd om"><div class="dn">'+(dip-i)+'</div></div>';
  for(var d=1;d<=dim;d++){
    var iso=cY+'-'+String(cM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var evs=evDay(iso);
    h+='<div class="cd'+(iso===today?' td':'')+'" data-dt="'+iso+'">'+
      '<div class="dn">'+d+'</div>'+
      evs.slice(0,3).map(function(e){return'<div class="ev '+(EC[e.tp]||'eo')+'" data-eid="'+esc(e.id)+'">'+esc(e.pe||e.ti)+'</div>';}).join('')+
      (evs.length>3?'<div class="em">+'+(evs.length-3)+' mais</div>':'')+
      '</div>';
  }
  var rem=(fd2+dim)%7===0?0:7-(fd2+dim)%7;
  for(var d2=1;d2<=rem;d2++)h+='<div class="cd om"><div class="dn">'+d2+'</div></div>';
  var cg=document.getElementById('cg'); cg.innerHTML=h;
  cg.onclick=null;
  cg.addEventListener('click',function(e){
    var ev=e.target.closest('[data-eid]'), day=e.target.closest('[data-dt]');
    if(ev){openE(null,ev.getAttribute('data-eid'));return;}
    if(day) openE(day.getAttribute('data-dt'),null);
  });
  rSide();
}
function rSide(){
  var today=td(), evs=lE();
  var up=evs.filter(function(e){return(e.en||e.st)>=today;}).sort(function(a,b){return a.st.localeCompare(b.st);}).slice(0,8);
  document.getElementById('nev').innerHTML=up.length?up.map(function(e){
    return'<div class="ei '+(EC[e.tp]||'eo')+'" data-eid="'+esc(e.id)+'">'+
    '<div style="font-size:10px;font-weight:700;opacity:.8">'+fd(e.st)+(e.en&&e.en!==e.st?' › '+fd(e.en):'')+'</div>'+
    '<div style="font-weight:700">'+esc(e.ti)+'</div>'+
    (e.pe?'<div style="font-size:10px;opacity:.75">👤 '+esc(e.pe)+'</div>':'')+
    '</div>';
  }).join(''):'<div class="ne">Nenhum evento próximo</div>';
  document.getElementById('nev').onclick=null;
  document.getElementById('nev').addEventListener('click',function(e){
    var el=e.target.closest('[data-eid]');if(el)openE(null,el.getAttribute('data-eid'));
  });
  var fr=evs.filter(function(e){return e.tp==='ferias'&&(e.en||e.st)>=today;}).sort(function(a,b){return a.st.localeCompare(b.st);});
  document.getElementById('fel').innerHTML=fr.length?fr.map(function(e){
    return'<div class="ei ef">'+
    '<div style="font-weight:700">'+esc(e.pe||e.ti)+'</div>'+
    '<div style="font-size:10px;font-weight:700;opacity:.8">'+fd(e.st)+' › '+fd(e.en||e.st)+'</div>'+
    (e.ob?'<div style="font-size:10px;opacity:.75">'+esc(e.ob)+'</div>':'')+
    '</div>';
  }).join(''):'<div class="ne">Nenhuma ausência</div>';
}
function openE(dd,eid){
  var e=eid?lE().find(function(x){return x.id===eid;}):null;
  document.getElementById('etit').textContent=e?'Editar Evento':'Novo Evento';
  document.getElementById('eid').value=e?e.id:'';
  document.getElementById('eti').value=e?e.ti:'';
  document.getElementById('etp').value=e?e.tp:'outro';
  document.getElementById('epe').value=e?(e.pe||''):'';
  document.getElementById('est').value=e?e.st:(dd||td());
  document.getElementById('een').value=e?(e.en||e.st):(dd||td());
  document.getElementById('eob').value=e?(e.ob||''):'';
  document.getElementById('edw').style.display=e?'flex':'none';
  document.getElementById('ovle').classList.add('on');
}
function closeE(){document.getElementById('ovle').classList.remove('on');}
function saveE(){
  var id=document.getElementById('eid').value;
  var ti=document.getElementById('eti').value.trim();
  var st=document.getElementById('est').value;
  if(!ti){alert('Preencha o título.');return;}
  if(!st){alert('Selecione a data.');return;}
  var evs=lE();
  var e={id:id||uid(),ti:ti,tp:document.getElementById('etp').value,pe:document.getElementById('epe').value,
    st:st,en:document.getElementById('een').value||st,ob:document.getElementById('eob').value.trim()};
  lsS('ev',id?evs.map(function(x){return x.id===id?e:x;}):evs.concat([e]));
  closeE(); badges(); rC();

function delE(){
  var id=document.getElementById('eid').value;
  if(!id||!confirm('Excluir evento?'))return;
  lsS('ev',lE().filter(function(e){return e.id!==id;}));
  closeE(); badges(); rC();
}
