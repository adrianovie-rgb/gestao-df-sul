<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Gestao DF-SUL</title><style>:root{--amz-orange:#FF9900;--amz-dark:#232F3E;--amz-blue:#00A8E1;--bg:#F5F7FA;--card:#FFFFFF;--border:#D5D9D9;--txt:#0F1111;--txt2:#565959;--font:'Amazon Ember','Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px;min-height:100vh}
.site-header{background:#131921;padding:0 24px;display:flex;align-items:center;gap:16px;height:54px;border-bottom:3px solid var(--amz-orange)}
.logo-text{font-size:21px;font-weight:700;color:#fff;font-style:italic}
.logo-smile{display:block;width:40px;height:7px;margin-top:-1px}
.hdr-sep{width:1px;height:30px;background:#3a4553}
.hdr-title{color:#fff;font-size:15px;font-weight:700}
.hdr-sub{color:#8fa3b1;font-size:11px}
.tab-bar{background:#1a2533;display:flex;padding:0 24px;gap:2px;border-bottom:1px solid #2d3a4a}
.tab-btn{padding:12px 20px;color:#8fa3b1;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn:hover{color:#fff}.tab-btn.active{color:#fff;border-bottom-color:var(--amz-orange)}
.tbadge{background:var(--amz-orange);color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;margin-left:5px}
.tab-content{display:none;padding:24px;max-width:1400px;margin:0 auto}.tab-content.active{display:block}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
.tleft{display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex:1}
.toolbar select,.toolbar input[type=text]{background:#fff;border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:12px;color:var(--txt);outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:var(--amz-orange)}
.btn{padding:8px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn-p{background:var(--amz-orange);color:#000}.btn-p:hover{background:#e68900}
.btn-g{background:#fff;border:1px solid var(--border);color:var(--txt2)}.btn-g:hover{border-color:var(--amz-orange);color:var(--txt)}
.tw{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.tt{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tt th{padding:10px 12px;font-size:10px;font-weight:700;color:#565959;text-transform:uppercase;letter-spacing:.6px;text-align:left;background:#f8f9fa;border-bottom:2px solid var(--border);white-space:nowrap}
.tt td{padding:9px 12px;border-bottom:1px solid #eff0f1;color:var(--txt);vertical-align:top;word-break:break-word;white-space:normal;line-height:1.5}
.tt tr:last-child td{border-bottom:none}.tt tr:hover td{background:#fafbfc}
.npill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:800;color:#fff}
.spill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:700}
.s-open{background:#FEF3C7;color:#92400E}.s-prog{background:#DBEAFE;color:#1e40af}
.s-done{background:#DCFCE7;color:#166534}.s-esc{background:#FEE2E2;color:#991B1B}
.pok{color:#166534;font-weight:700}.palert{color:#b45309;font-weight:700}.plate{color:#991B1B;font-weight:700}
.bsm{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:none}
.bed{background:#dbeafe;color:#1e40af}.bed:hover{background:#bfdbfe}
.bdl{background:#fee2e2;color:#991b1b}.bdl:hover{background:#fecaca}
.empty{text-align:center;padding:48px 24px;color:var(--txt2)}.empty .ei{font-size:40px;margin-bottom:12px}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s;text-decoration:none;display:flex;flex-direction:column;gap:6px}
.lcard:hover{border-color:var(--amz-orange);box-shadow:0 2px 10px rgba(255,153,0,.15);transform:translateY(-1px)}
.lico{font-size:24px}.lname{font-size:13px;font-weight:700;color:var(--txt)}
.ldesc{font-size:11px;color:var(--txt2);line-height:1.4}
.lurl{font-size:10px;color:var(--amz-blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lsec{margin-bottom:24px}
.lsec h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txt2);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.ladd{background:none;border:2px dashed var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:90px}

.alay{display:grid;grid-template-columns:1fr 310px;gap:20px}

.cwrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}

.bnav:hover{border-color:var(--amz-orange)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 8px}
.cdow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--txt2);padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:4px}
.cday{min-height:72px;border-radius:7px;padding:4px 5px;cursor:pointer;transition:background .15s}
.cday:hover{background:#f5f7fa}
.cday.today .dnum{background:var(--amz-orange);color:#000;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:800}
.cday.otm .dnum{color:#c8cdd2}
.dnum{font-size:12px;font-weight:600;color:var(--txt);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.cev{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mev{font-size:9px;color:var(--txt2);padding:0 4px}
.ef{background:#fce7f3;color:#9d174d}.ed{background:#dbeafe;color:#1e40af}
.ew{background:#dcfce7;color:#166534}.er{background:#ede9fe;color:#5b21b6}.eo{background:#f1f5f9;color:#475569}
.aside{display:flex;flex-direction:column;gap:14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.shead{padding:12px 16px;background:#f8f9fa;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px}
.sbody{padding:12px 16px}
.eitem{padding:8px 10px;border-radius:7px;margin-bottom:6px;font-size:12px;cursor:pointer}
.eitem .edt{font-size:10px;font-weight:700;opacity:.8;margin-bottom:2px}
.eitem .eti{font-weight:700}.eitem .ewho{font-size:10px;opacity:.75;margin-top:1px}
.legrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt2);margin-bottom:6px}
.ldot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.noev{text-align:center;padding:16px;color:var(--txt2);font-size:12px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}
.ovl.open{display:flex}
.modal{background:#1a1d20;border-radius:14px;width:min(580px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(0,0,0,.6);border:1px solid #2d3035;color:#e8eaed}
.mhead{padding:18px 24px 14px;border-bottom:1px solid #2d3035;display:flex;align-items:center;justify-content:space-between}

.mbody{padding:20px 24px;display:grid;gap:14px}.tc{grid-template-columns:1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}.field.full{grid-column:1/-1}
.field label{font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;letter-spacing:.7px}
.field input,.field select,.field textarea{background:#0f1214;border:1px solid #2d3035;border-radius:6px;padding:8px 11px;font-size:12px;color:#e8eaed;outline:none;font-family:var(--font)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amz-orange)}
.field textarea{min-height:80px;resize:vertical}
.mfoot{padding:14px 24px 18px;border-top:1px solid #2d3035;display:flex;justify-content:flex-end;gap:10px;background:#1a1d20;border-radius:0 0 14px 14px}
.bsave{background:var(--amz-orange);color:#000;border:none;border-radius:8px;padding:9px 22px;font-size:12px;font-weight:800;cursor:pointer}.bsave:hover{background:#e8960f}
.bcanc{background:none;border:1px solid #3d4449;color:#9aa0a6;border-radius:8px;padding:9px 16px;font-size:12px;cursor:pointer}.bcanc:hover{border-color:#9aa0a6;color:#e8eaed}</style></head><body><div class='site-header'>

</div></div><script>var NC={ECB8:'#1e40af',EIJ8:'#7c3aed',EJO8:'#0369a1',ELO8:'#065f46',EME8:'#9a3412',EMR8:'#1d4ed8',EOZ8:'#6b21a8',EGO8:'#14532d',ERS8:'#92400e',ESB8:'#1e3a5f',ESE8:'#7f1d1d',EUM8:'#3b0764',EVE8:'#134e4a',EXS9:'#78350f'};
var EVC={ferias:'ef',ddd:'ed',wbr:'ew',reun:'er',outro:'eo'};
var EVL={ferias:'Ferias',ddd:'DDD',wbr:'WBR',reun:'Reuniao',outro:'Outro'};
var SL={open:'Em Aberto',prog:'Em Andamento',done:'Resolvido',esc:'Escalado'};
var SC={open:'s-open',prog:'s-prog',done:'s-done',esc:'s-esc'};
var calY=new Date().getFullYear(),calM=new Date().getMonth();
var MN=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var DN=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
var DB='https://gestao-df-sul-default-rtdb.firebaseio.com';
var _cache={};var _evtSrc={};

function dbUrl(p){return DB+'/'+p+'.json'}

function dbGet(p,cb){
  var x=new XMLHttpRequest();x.open('GET',dbUrl(p));
  x.onload=function(){try{cb(JSON.parse(x.responseText||'null'))}catch(e){cb(null)}};
  x.onerror=function(){cb(null)};x.send();
}

function dbSet(p,v,cb){
  _cache[p]=v;
  var x=new XMLHttpRequest();x.open('PUT',dbUrl(p));
  x.setRequestHeader('Content-Type','application/json');
  x.onload=function(){if(cb)cb(x.status===200)};
  x.onerror=function(){if(cb)cb(false)};
  x.send(JSON.stringify(v));
}

function dbListen(p,cb){
  if(_evtSrc[p]){try{_evtSrc[p].close()}catch(e){}}
  var es=new EventSource(dbUrl(p));
  es.addEventListener('put',function(e){

var MNP=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var DNP=['D','S','T','Q','Q','S','S'];

function toggleDateMode(){

  document.getElementById('eModeDaysFields').style.display=isDays?'block':'none';

}

function renderPicker(){
  document.getElementById('pickerTitle').textContent=MNP[_pickerM]+' '+_pickerY;
  var dim=new Date(_pickerY,_pickerM+1,0).getDate();
  var fd=new Date(_pickerY,_pickerM,1).getDay();
  var html=DNP.map(function(d){return'<div style="text-align:center;font-size:9px;font-weight:700;color:#9aa0a6;padding:3px 0">'+d+'</div>'}).join('');
  for(var i=0;i<fd;i++)html+='<div></div>';
  for(var d=1;d<=dim;d++){
    var iso=_pickerY+'-'+String(_pickerM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var sel=_pickerSel.indexOf(iso)>-1;
    html+='<div onclick="toggleDay(''+iso+'')" style="text-align:center;font-size:11px;padding:4px 2px;border-radius:4px;cursor:pointer;font-weight:'+(sel?'800':'400')+';background:'+(sel?'#FF9900':'transparent')+';color:'+(sel?'#000':'#e8eaed')+'">'+d+'</div>';
  }
  document.getElementById('pickerGrid').innerHTML=html;
  var sel=_pickerSel.slice().sort();
  document.getElementById('pickerSelected').textContent=sel.length?sel.length+' dia(s): '+sel.map(function(s){var p=s.split('-');return p[2]+'/'+p[1]}).join(', '):'Nenhum dia selecionado';
}

function toggleDay(iso){

  if(idx>-1)_pickerSel.splice(idx,1);else _pickerSel.push(iso);

}
